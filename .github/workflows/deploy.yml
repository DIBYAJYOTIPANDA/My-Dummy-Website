name: Test Azure Login

on:
  push:
    branches:
      - main
jobs:
  test-login:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Azure Login Test
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Run Azure CLI Command
      run: |
        az account show
